name: 改善提案
description: 単元・機能・その他の改善アイデアを提案します。
title: '[改善提案] '
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        改善提案ありがとうございます。ロードマップ検討の参考にします。
        個人情報(氏名・メールアドレス・電話番号など)は入力しないでください。
  - type: dropdown
    id: target
    attributes:
      label: 対象
      description: 提案の対象を選択してください。
      options:
        - 単元
        - 機能
        - その他
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
      description: 提案の詳細を記載してください。
    validations:
      required: true
