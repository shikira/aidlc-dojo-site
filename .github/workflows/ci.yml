name: CI

# Triggers: PRs targeting main (the merge gate) plus pushes to main so the
# bootstrap-window direct commit is verified before branch protection is enabled.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# SEC-5: minimal workflow permissions. CI only reads the repo contents.
permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      # SEC-6: third-party actions pinned to a commit SHA (version in comment).
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  # bv: reserved — UW-02 provides; append to ci-gate needs (no branch-protection change required)

  # Single aggregate required status check. Branch protection requires ONLY
  # `ci-gate`; new jobs (e.g. bv) join the gate by being added to `needs` below —
  # no branch-protection change required. Runs with `if: always()` and asserts
  # every dependency succeeded so a skipped dependency cannot silently pass.
  ci-gate:
    name: ci-gate
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()
    steps:
      - name: Verify all required jobs passed
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "One or more required CI jobs did not succeed — blocking merge."
            exit 1
          fi
          echo "All required CI jobs passed — ci-gate green."
