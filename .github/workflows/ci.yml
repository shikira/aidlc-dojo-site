name: CI

# Triggers: PRs targeting main (the merge gate) plus pushes to main so the
# bootstrap-window direct commit is verified before branch protection is enabled.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# SEC-5: minimal workflow permissions. CI only reads the repo contents.
permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      # SEC-6: third-party actions pinned to a commit SHA (version in comment).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  bv:
    name: bv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run bv

  # SIZE gate (UW-03 / R-B): fails if the island client bundle exceeds its gz
  # budget (10 KB). Builds first because size-limit measures dist/_astro/*.js.
  size:
    name: size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run size

  # INFRA gate (uw-06b): the delivery IaC lives in a separate CDK project under
  # infra/. It is validated by CDK-assertion tests + a credential-free `cdk synth`
  # (no AWS creds in CI — synth uses context/env defaults). The IaC is held
  # outside the src/**/*.ts coverage boundary; this job is its regression guard.
  infra:
    name: infra
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npx cdk synth --quiet

  # Single aggregate required status check. Branch protection requires ONLY
  # `ci-gate`; new jobs (e.g. bv, size) join the gate by being added to `needs`
  # below — no branch-protection change required. Runs with `if: always()` and
  # asserts every dependency succeeded so a skipped dependency cannot silently
  # pass.
  ci-gate:
    name: ci-gate
    runs-on: ubuntu-latest
    needs: [lint, test, build, bv, size, infra]
    if: always()
    steps:
      - name: Verify all required jobs passed
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.bv.result }}" != "success" ] || \
             [ "${{ needs.size.result }}" != "success" ] || \
             [ "${{ needs.infra.result }}" != "success" ]; then
            echo "One or more required CI jobs did not succeed — blocking merge."
            exit 1
          fi
          echo "All required CI jobs passed — ci-gate green."
