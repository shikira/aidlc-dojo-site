- id: q-rulecustom-1
  unitId: rule-customization
  afterSection: settings-のオーバーライドとスコープ深度テスト戦略
  prompt: '秘密情報や個人的な設定上書きは、どのファイルに置くべきですか。'
  choices:
    - 'コミットされる .claude/settings.json'
    - 'gitignore された .claude/settings.local.json'
    - 'aidlc/spaces/default/memory/org.md'
  answerIndex: 1
  explanation:
    'settings.json はバージョン管理されコミットされるため、機微な値や個人的な上書きは
    gitignore 済みの settings.local.json に置きます。'
  sourceUrl: https://github.com/awslabs/aidlc-workflows/blob/b67798c37c71855271b70882a33f47890d41f212/docs/guide/13-customization.md

- id: q-rulecustom-2
  unitId: rule-customization
  afterSection: ツール権限の拡張と縮小extending-ai-dlc
  prompt: 'エージェントに出荷時から掛かっている唯一のツール制限はどれですか。'
  choices:
    - 'disallowedTools: Task(ネストしたサブエージェント生成の禁止)'
    - 'Bash が全面的に禁止されている'
    - 'Write と Edit が禁止されている'
    - '全エージェントで WebSearch が禁止されている'
  answerIndex: 0
  explanation:
    'エージェントは既定でセッションのツールセット全部を継承し、唯一の出荷時制限は
    disallowedTools: Task(ネストしたサブエージェント生成の禁止)です。'
  sourceUrl: https://github.com/awslabs/aidlc-workflows/blob/b67798c37c71855271b70882a33f47890d41f212/docs/guide/13-customization.md

- id: q-rulecustom-3
  unitId: rule-customization
  afterSection: 5-層ルールチェーンでのチームプロジェクト適応
  prompt: 'v2 の 5 層ルールチェーンの解決モデルはどれですか。'
  choices:
    - 'overrides: ブロックにより上位スコープが下位を上書きする'
    - 'enforcement: enforced が付いたルールだけが実行時に適用される'
    - 'strict-additive — 適用されるルールはすべて文脈に現れ、実行時に落ちない'
  answerIndex: 2
  explanation:
    'strict-additive。org→team→project→phase→stage が連結され何も drop せず、旧来の
    overrides: / enforcement: キーワードは廃止されています。'
  sourceUrl: https://github.com/awslabs/aidlc-workflows/blob/b67798c37c71855271b70882a33f47890d41f212/docs/reference/08-rule-system.md

- id: q-rulecustom-4
  unitId: rule-customization
  afterSection: team-knowledge二層の追加
  prompt: 'アップグレードで上書きされるため編集してはいけない知識の層はどれですか。'
  choices:
    - 'Tier 2 — space レベルの aidlc/knowledge/ のチーム知識'
    - 'Tier 1 — .claude/knowledge/ の方法論知識'
    - 'aidlc/spaces/<space>/memory/project.md のルール'
  answerIndex: 1
  explanation:
    'Tier 1 の方法論知識は同梱でアップグレード時に上書きされます。編集してよいのは
    space レベルの Tier 2 チーム知識だけです。'
  sourceUrl: https://github.com/awslabs/aidlc-workflows/blob/b67798c37c71855271b70882a33f47890d41f212/docs/harness-engineering/07-team-knowledge.md

- id: q-rulecustom-5
  unitId: rule-customization
  afterSection: 学習ループによる自己修正
  prompt: '学習ゲートで確定した学びが効き始めるのはいつですか。'
  choices:
    - 'その場で即座に、現在のワークフローの残りステージに適用される'
    - 'org.md に書き込まれ、全プロジェクトへ即時に反映される'
    - '承認ゲートを 3 回通過した時点で有効になる'
    - '次のワークフローから(走行中は開始時のコンパイル済みビューを保つ)'
  answerIndex: 3
  explanation:
    '確定した学びはディスクに載っても走行中のワークフローには反映されず、次回の
    コンパイルから効きます — 地面を途中で変えない予測可能性を守ります。'
  sourceUrl: https://github.com/awslabs/aidlc-workflows/blob/b67798c37c71855271b70882a33f47890d41f212/docs/guide/09-rules-and-the-learning-loop.md

