- id: q-operations-1
  unitId: operations-and-improvement
  afterSection: operation-フェーズ概観とデプロイ経路4143
  prompt: 'mvp・poc・bugfix・refactor スコープでは Operation フェーズはどう扱われますか。'
  choices:
    - '7 ステージすべてを Minimal 深度で実行する'
    - '4.1 Deployment Pipeline と 4.3 Deployment Execution だけを実行する'
    - 'Operation フェーズを丸ごとスキップする'
  answerIndex: 2
  explanation:
    'mvp・poc・bugfix・refactor は Operation を丸ごとスキップします。infra は
    4.1〜4.4、security-patch は 4.1 と 4.3 のみを実行します。'
  sourceUrl: https://github.com/awslabs/aidlc-workflows/blob/b67798c37c71855271b70882a33f47890d41f212/docs/reference/04-stages/operation.md

