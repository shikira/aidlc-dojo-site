    - '4.1 Deployment Pipeline'
    - '4.5 Incident Response & Runbook Generation'
    - '4.3 Deployment Execution'
  answerIndex: 0
  explanation:
    '4.4 は dashboards・alarms・slo-config・log-queries・tracing-config・anomaly-config
