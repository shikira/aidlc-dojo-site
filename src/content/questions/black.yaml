# ─────────────────────────────────────────────────────────────
# ⑯ antipatterns-and-pitfalls(common / 4問 / 全問 sourced — Q-3/C-5)
# ─────────────────────────────────────────────────────────────
- id: q-antipattern-1
  unitId: antipatterns-and-pitfalls
  afterSection: 仕様なきコード生成と過信の罠
  prompt: '「迷ったら訊く。不完全な回答は貧弱な設計を生む」に対応する AI-DLC の原則はどれですか。'
  choices:
    - 'Questions before assumptions(仮定の前に質問)'
    - 'Adaptive depth(アダプティブ深度)'
    - 'Traceable artifacts(トレース可能な成果物)'
  answerIndex: 0
  explanation:
    'Questions before assumptions。No emergent behavior や User decides, AI executes
    とともに、過信と仕様なきコード生成を抑える中核原則です。'
  sourceUrl: https://github.com/awslabs/aidlc-workflows/blob/b67798c37c71855271b70882a33f47890d41f212/core/knowledge/aidlc-shared/ai-dlc-principles.md

- id: q-antipattern-2
  unitId: antipatterns-and-pitfalls
  afterSection: コンテキスト肥大化と-compaction
  prompt: 'compaction(コンテキスト要約)で失われるものはどれですか。'
  choices:
    - 'レコードディレクトリのアーティファクト(ディスク上のファイル)'
    - 'aidlc-state.md(ステージ進捗・スコープ)'
    - 'audit/ シャード(判断と行動の全履歴)'
    - '.aidlc-recovery.md(ステージチェックポイント)'
    - 'メモリ上の会話文脈と、ファイルに未書き込みの途中作業'
  answerIndex: 4
  explanation:
    '失われるのはメモリ上のもの(会話文脈・未書き込みの途中作業)だけです。ディスク上の
    state・アーティファクト・audit・recovery ブレッドクラムは保持されます。'
  sourceUrl: https://github.com/awslabs/aidlc-workflows/blob/b67798c37c71855271b70882a33f47890d41f212/docs/guide/11-session-management.md

- id: q-antipattern-3
  unitId: antipatterns-and-pitfalls
  afterSection: 承認ゲートの停滞と-3-strike-リビジョン離脱
  prompt: '同じステージで 3 回以上 Request Changes を出すと現れる 3 番目の選択肢はどれですか。'
  choices:
    - 'Restart workflow(ワークフローを最初からやり直す)'
    - 'Accept as-is(現行版をアーカイブして次へ進む)'
    - 'Delete stage(ステージを削除する)'
  answerIndex: 1
  explanation:
    '3-Strike 脱出ハッチです。3 回以上のリビジョンで Accept as-is が現れ、現行版を
    アーカイブして進みます。リビジョンカウントは次ステージでリセットされます。'
  sourceUrl: https://github.com/awslabs/aidlc-workflows/blob/b67798c37c71855271b70882a33f47890d41f212/docs/guide/07-interaction-modes.md

- id: q-antipattern-4
  unitId: antipatterns-and-pitfalls
  afterSection: state-破損hook-不発lock-残留の運用トラブルと復旧
  prompt: '「監査エントリが出ない・サブエージェント完了ログが出ない」= hook 不発の最も多い原因はどれですか。'
  choices:
    - 'bun が未インストールか PATH に無い'
    - 'ディスク容量が不足している'
    - 'aidlc-state.md が存在しない'
    - 'インターネット接続が無い'
  answerIndex: 0
  explanation:
    '11 個の TypeScript フックはすべて bun を要します。bun が無い/非対話シェルの PATH
    に無いのが最頻の原因で、次点は settings.json の hooks ブロック未設定です。'
  sourceUrl: https://github.com/awslabs/aidlc-workflows/blob/b67798c37c71855271b70882a33f47890d41f212/docs/guide/15-troubleshooting.md
