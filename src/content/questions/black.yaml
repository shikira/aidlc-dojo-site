- id: q-operations-4
  unitId: operations-and-improvement
  afterSection: continuous-feedback-optimization47と継続改善
  prompt: 'ワークフロー最終ステージ 4.7 のユニークな承認ゲートの特徴はどれですか。'
  choices:
