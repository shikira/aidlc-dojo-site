  prompt: '4.6 Performance Validation & Load Testing について正しいものはどれですか。'
  choices:
    - 'リードは aidlc-operations-agent で、cd-config.md を出力する'
    - '承認ゲートを持たず自動で完了する'
    - '本番デプロイそのものを実行するステージである'
    - 'リードは aidlc-quality-agent で、NFR 目標 vs 実測の nfr-validation-matrix.md を出力する'
  answerIndex: 3
